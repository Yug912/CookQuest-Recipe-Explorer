<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookQuest-Recipe Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
        <p>CookQuest</p>
        <div>
        <input type="text" placeholder="Search for recipes..." class="searchbox">
        <button type="submit"class="searchbutton">Search</button>
        </div>
        </nav>
    </header>
    <main>
        <section>
            <div class="recipe-container">
                 <h1>Search your favourite recipes....</h1>
            </div>
            <div class="recipe-details">
                <button class="recipe-back-button">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="recipe-detail-content"></div>
            </div>
        </section>
        
    </main>
</body>
<script src="script.js"></script>
<script src="https://kit.fontawesome.com/25764d1c61.js" crossorigin="anonymous"></script>
</html>
